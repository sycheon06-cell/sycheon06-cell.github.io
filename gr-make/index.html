<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="입력한 내용을 서버로 보내지 않고 브라우저 안에서 QR 코드를 생성하는 정적 웹 도구입니다.">
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QR Maker">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Private QR Maker</title>
  <style>
    :root{--bg:#eef3f6;--panel:#fff;--soft:#f7fafc;--ink:#111827;--muted:#617082;--line:#d8e0ea;--accent:#0f766e;--accent-dark:#0b5d57;--warn:#fff7e6;--warn-line:#f1cd88;--danger:#b42318;--danger-bg:#fff0ee;--shadow:0 18px 46px rgba(15,23,42,.12)}
    *{box-sizing:border-box}html{min-width:320px}body{min-height:100vh;margin:0;color:var(--ink);background:linear-gradient(180deg,#fbfdff 0%,var(--bg) 58%,#e4ebf1 100%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}.app{width:min(1160px,100%);min-height:100vh;margin:auto;padding:28px 16px;display:grid;align-content:center;gap:16px}.workspace{display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,420px);gap:20px}.panel{min-width:0;border:1px solid rgba(216,224,234,.95);border-radius:8px;background:rgba(255,255,255,.96);box-shadow:var(--shadow)}.editor,.preview{padding:24px}.preview{display:grid;gap:16px;align-content:center}.header,.preview-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.brand{display:flex;gap:13px;min-width:0}.brand-logo{width:46px;height:46px;flex:0 0 auto;display:block;border-radius:12px;box-shadow:0 10px 24px rgba(15,118,110,.18)}.eyebrow,.kicker{margin:0 0 8px;color:var(--accent);font-size:.78rem;font-weight:800;text-transform:uppercase}h1,h2{margin:0;letter-spacing:0;word-break:keep-all;overflow-wrap:break-word}h1{max-width:720px;font-size:clamp(2rem,4.8vw,3.6rem);line-height:1.07}h2{font-size:1.1rem}.pill,.badge{min-width:92px;padding:8px 12px;border:1px solid #b7ddd7;border-radius:999px;color:var(--accent-dark);background:#e7f5f2;font-size:.82rem;font-weight:800;text-align:center;white-space:nowrap}.pill.warn{color:#7a4b00;border-color:var(--warn-line);background:var(--warn)}.pill.error{color:var(--danger);border-color:#f4b7af;background:var(--danger-bg)}.note{margin:20px 0 18px;padding:14px 16px;border:1px solid var(--warn-line);border-radius:8px;color:#493a18;background:var(--warn);line-height:1.55;word-break:keep-all}.note strong{display:block;color:#2f250d}.label,.control span{display:block;margin-bottom:8px;color:#344054;font-size:.88rem;font-weight:750}textarea{width:100%;min-height:172px;resize:vertical;padding:15px;border:1px solid var(--line);border-radius:8px;color:var(--ink);background:var(--soft);line-height:1.55;outline:none}textarea::placeholder{color:#9aa6b2;opacity:1}textarea:focus,select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.18)}.validation{margin:10px 0 0;padding:10px 12px;border:1px solid var(--warn-line);border-radius:8px;color:#6b4200;background:var(--warn);font-size:.88rem;line-height:1.45;word-break:keep-all}.validation.error{color:var(--danger);border-color:#f4b7af;background:var(--danger-bg)}.validation[hidden]{display:none}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.control{min-width:0;padding:13px;border:1px solid var(--line);border-radius:8px;background:var(--soft)}select{width:100%;height:42px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fff;outline:none}input[type=range]{width:100%;accent-color:var(--accent)}output{display:block;margin-top:6px;color:var(--muted);font-size:.82rem}.colors{display:flex;gap:10px}input[type=color]{width:52px;height:42px;padding:4px;border:1px solid var(--line);border-radius:6px;background:#fff}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}button{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 16px;border:1px solid var(--accent);border-radius:7px;color:#fff;background:var(--accent);font-weight:800;cursor:pointer}button:hover{background:var(--accent-dark);border-color:var(--accent-dark)}button:disabled{opacity:.52;cursor:not-allowed}.ghost{color:var(--ink);border-color:var(--line);background:#fff}.ghost:hover{color:var(--ink);border-color:#b9c5d4;background:#f7f9fc}.button-icon{width:18px;height:18px;flex:0 0 auto}.frame{width:100%;max-width:392px;min-width:0;margin:0 auto;aspect-ratio:1;display:grid;place-items:center;padding:14px;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:linear-gradient(45deg,#edf2f7 25%,transparent 25%),linear-gradient(-45deg,#edf2f7 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#edf2f7 75%),linear-gradient(-45deg,transparent 75%,#edf2f7 75%);background-position:0 0,0 10px,10px -10px,-10px 0;background-size:20px 20px}canvas{display:block;width:100%;max-width:360px;min-width:0;height:auto;image-rendering:pixelated;box-shadow:0 12px 28px rgba(23,32,51,.15)}.empty-preview{color:var(--muted);font-size:.92rem;text-align:center;word-break:keep-all}.meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0}.meta div{min-width:0;padding:11px;border:1px solid var(--line);border-radius:8px;background:#fff}.meta dt{color:var(--muted);font-size:.72rem;font-weight:750;text-transform:uppercase}.meta dd{margin:4px 0 0;font-size:1rem;font-weight:850;overflow-wrap:anywhere}.footer{display:flex;justify-content:space-between;gap:14px;color:var(--muted);font-size:.83rem}@media(max-width:900px){.app{max-width:640px;align-content:start;padding:14px 10px}.workspace{grid-template-columns:minmax(0,1fr)}.editor,.preview{padding:18px}.header,.preview-head{flex-direction:column}.grid{grid-template-columns:minmax(0,1fr)}textarea{min-height:148px}h1{font-size:clamp(1.75rem,7vw,2.55rem);line-height:1.14}.footer{flex-direction:column}}@media(max-width:430px){.app{padding-left:8px;padding-right:8px}.editor,.preview{padding:16px}.brand{flex-direction:column}.brand-logo{width:44px;height:44px}.actions button{flex:1 1 120px;min-height:48px}.meta{grid-template-columns:minmax(0,1fr)}select{min-height:48px}.frame{padding:10px;max-width:100%}canvas{width:calc(100vw - 86px);max-width:280px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="workspace" aria-label="QR code maker">
      <div class="panel editor">
        <header class="header">
          <div class="brand">
            <img class="brand-logo" src="./logo.svg" alt="" width="46" height="46">
            <div>
              <p class="eyebrow">Private QR Maker</p>
              <h1>브라우저에서만 생성하는 QR 코드</h1>
            </div>
          </div>
          <div class="pill" id="status">입력 대기</div>
        </header>
        <div class="note"><strong>입력한 QR 내용은 서버로 전송되지 않습니다.</strong>이 페이지의 JavaScript가 현재 브라우저 안에서 QR 이미지를 생성합니다. QR 렌더링 라이브러리만 CDN에서 불러옵니다.</div>
        <label class="label" for="qrText">QR에 담을 내용</label>
        <textarea id="qrText" spellcheck="false" placeholder="예: https://sycheon06-cell.github.io/gr-make/"></textarea>
        <p class="validation" id="validation" hidden></p>
        <div class="grid">
          <label class="control"><span>오류 복원</span><select id="level"><option value="M" selected>Medium</option><option value="L">Low</option><option value="Q">Quartile</option><option value="H">High</option></select></label>
          <label class="control"><span>크기</span><input id="size" type="range" min="160" max="720" step="20" value="360"><output id="sizeValue">360 px</output></label>
          <label class="control"><span>여백</span><input id="margin" type="range" min="1" max="8" step="1" value="4"><output id="marginValue">4 modules</output></label>
          <label class="control"><span>색상</span><div class="colors"><input id="dark" type="color" value="#111827" aria-label="QR foreground color"><input id="light" type="color" value="#ffffff" aria-label="QR background color"></div></label>
        </div>
        <div class="actions">
          <button id="share" type="button" disabled aria-label="QR 코드 공유">
            <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/></svg>
            <span>공유</span>
          </button>
          <button id="png" type="button" disabled>PNG</button>
          <button id="svg" type="button" disabled>SVG</button>
          <button id="clear" type="button" class="ghost">Clear</button>
        </div>
      </div>
      <aside class="panel preview" aria-label="Generated QR preview">
        <div class="preview-head"><div><p class="kicker">Live preview</p><h2>출력 미리보기</h2></div><span class="badge">Local only</span></div>
        <div class="frame"><canvas id="canvas" width="360" height="360"></canvas><div class="empty-preview" id="emptyPreview">내용을 입력하면 QR 코드가 생성됩니다.</div></div>
        <dl class="meta"><div><dt>Version</dt><dd id="version">-</dd></div><div><dt>Size</dt><dd id="pixels">-</dd></div><div><dt>Bytes</dt><dd id="bytes">-</dd></div></dl>
      </aside>
    </section>
    <footer class="footer"><span>Static web app for GitHub Pages.</span><span>No backend, no upload, no tracking script.</span></footer>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    const byId=id=>document.getElementById(id);
    const text=byId('qrText'),level=byId('level'),size=byId('size'),margin=byId('margin'),dark=byId('dark'),light=byId('light'),canvas=byId('canvas'),status=byId('status'),share=byId('share'),png=byId('png'),svg=byId('svg'),validation=byId('validation'),emptyPreview=byId('emptyPreview');
    let lastSvg='',lastPngBlob=null,renderToken=0;

    function setStatus(message,tone='ok'){
      status.textContent=message;
      status.classList.toggle('warn',tone==='warn');
      status.classList.toggle('error',tone==='error');
    }
    function setDownloads(enabled){share.disabled=!enabled;png.disabled=!enabled;svg.disabled=!enabled}
    function resetPreview(message='내용을 입력하면 QR 코드가 생성됩니다.'){
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
      canvas.hidden=true;
      emptyPreview.hidden=false;
      emptyPreview.textContent=message;
      lastSvg='';
      lastPngBlob=null;
      setDownloads(false);
      byId('version').textContent='-';
      byId('pixels').textContent='-';
      byId('bytes').textContent='-';
    }
    function setValidation(result){
      validation.hidden=!result.message;
      validation.textContent=result.message||'';
      validation.classList.toggle('error',result.tone==='error');
    }
    function analyzeInput(value){
      const candidate=value.trim();
      const compact=candidate.replace(/\s+/g,'');
      const urlish=/^(https?:\/\/|www\.|[a-z0-9][a-z0-9-]*(\.[a-z0-9-]+)+)([:/?#]|$)/i.test(compact);
      if(/\s/.test(candidate)&&urlish)return{tone:'error',message:'주소 안에 공백이나 줄바꿈이 있습니다. 복사한 주소를 다시 확인하세요.'};
      if(!urlish)return{tone:'ok',message:''};
      if(!/^https?:\/\//i.test(candidate))return{tone:'warn',message:'웹 주소처럼 보입니다. 스캔 후 바로 열리게 하려면 앞에 https://를 붙이는 것을 권장합니다.'};
      try{
        const parsed=new URL(candidate);
        if(!parsed.hostname||!parsed.hostname.includes('.'))return{tone:'warn',message:'주소의 도메인이 불완전해 보입니다. 복사한 주소를 확인하세요.'};
      }catch(error){return{tone:'error',message:'주소 형식이 올바르지 않습니다. 예: https://example.com'}}
      return{tone:'ok',message:''};
    }
    function downloadFile(name,blob){
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=name;
      document.body.append(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }
    async function shareQr(){
      const value=text.value.trim();
      if(!value||!lastPngBlob)return;
      if(typeof navigator==='undefined'||typeof navigator.share!=='function'){
        setValidation({tone:'warn',message:'이 브라우저는 직접 공유를 지원하지 않습니다. PNG로 저장한 뒤 카톡이나 메일에 첨부하세요.'});
        return;
      }
      const canCreateFile=typeof File==='function';
      const file=canCreateFile?new File([lastPngBlob],'qr-code.png',{type:lastPngBlob.type||'image/png'}):null;
      const canShareFile=Boolean(file&&typeof navigator.canShare==='function'&&navigator.canShare({files:[file]}));
      try{
        if(canShareFile){
          await navigator.share({title:'QR 코드',text:'생성한 QR 코드입니다.',files:[file]});
          return;
        }
        await navigator.share({title:'QR 코드',text:value});
      }catch(error){
        if(error&&error.name==='AbortError')return;
        setValidation({tone:'warn',message:'공유가 취소되었거나 이 브라우저에서 QR 이미지 공유를 지원하지 않습니다. PNG로 저장한 뒤 카톡이나 메일에 첨부하세요.'});
      }
    }
    function render(){
      const currentToken=++renderToken;
      const value=text.value.trim();
      byId('sizeValue').value=`${size.value} px`;
      byId('marginValue').value=`${margin.value} modules`;
      if(!window.QRCode||typeof QRCode.toCanvas!=='function'){
        setValidation({tone:'error',message:'QR 생성 라이브러리를 불러오지 못했습니다. 네트워크 연결을 확인하세요.'});
        resetPreview('QR 생성 준비에 실패했습니다.');
        setStatus('로드 실패','error');
        return;
      }
      if(!value){
        setValidation({tone:'ok',message:''});
        resetPreview();
        setStatus('입력 대기');
        return;
      }
      const check=analyzeInput(value);
      setValidation(check);
      if(check.tone==='error'){
        resetPreview('주소를 확인한 뒤 다시 생성하세요.');
        setStatus('주소 확인 필요','error');
        return;
      }
      const options={errorCorrectionLevel:level.value,margin:Number(margin.value),width:Number(size.value),color:{dark:dark.value,light:light.value}};
      canvas.hidden=false;
      emptyPreview.hidden=true;
      lastSvg='';
      lastPngBlob=null;
      setDownloads(false);
      QRCode.toCanvas(canvas,value,options,error=>{
        if(currentToken!==renderToken)return;
        if(error){
          resetPreview('입력 내용이 너무 길거나 QR 생성에 실패했습니다.');
          setStatus('생성 실패','error');
          return;
        }
        QRCode.toString(value,{...options,type:'svg'},(svgError,out)=>{if(currentToken===renderToken)lastSvg=svgError?'':out});
        canvas.toBlob(blob=>{
          if(currentToken!==renderToken)return;
          lastPngBlob=blob;
          setDownloads(Boolean(blob));
        },'image/png');
        setStatus(check.tone==='warn'?'확인 필요':'생성 완료',check.tone);
        byId('version').textContent='auto';
        byId('pixels').textContent=`${canvas.width} px`;
        byId('bytes').textContent=new TextEncoder().encode(value).length;
      });
    }

    [text,level,size,margin,dark,light].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render)});
    share.addEventListener('click',shareQr);
    png.addEventListener('click',()=>lastPngBlob&&downloadFile('qr-code.png',lastPngBlob));
    svg.addEventListener('click',()=>lastSvg&&downloadFile('qr-code.svg',new Blob([lastSvg],{type:'image/svg+xml'})));
    byId('clear').addEventListener('click',()=>{text.value='';text.focus();render()});
    resetPreview();
    render();
    if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}
  </script>
</body>
</html>
